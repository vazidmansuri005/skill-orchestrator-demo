<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="820" viewBox="0 0 1240 820" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#868e96"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1240" height="820" fill="#ffffff"/>
  <text x="60" y="44" font-size="25" font-weight="700" fill="#212529">Inside one agent request: routing, skills, and the token budget</text>
  <text x="60" y="72" font-size="15" fill="#868e96">What actually enters the context window on a single request — and why a 40-skill catalog barely changes it.</text>

  <!-- ===== LEFT: lifecycle ===== -->
  <text x="70" y="116" font-size="15" font-weight="700" fill="#212529">1 · Request lifecycle</text>

  <rect x="70" y="134" width="260" height="42" rx="8" fill="#f1f3f5" stroke="#495057" stroke-width="1.5"/>
  <text x="200" y="160" font-size="14" text-anchor="middle" fill="#212529">USER REQUEST</text>
  <line x1="200" y1="176" x2="200" y2="194" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="70" y="196" width="260" height="56" rx="9" fill="#d0bfff" stroke="#7048e8" stroke-width="1.8"/>
  <text x="200" y="220" font-size="15" font-weight="700" text-anchor="middle" fill="#212529">ROUTER</text>
  <text x="200" y="238" font-size="11" text-anchor="middle" fill="#495057">reads the index only (Tier 1)</text>
  <line x1="200" y1="252" x2="200" y2="270" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="70" y="272" width="260" height="56" rx="9" fill="#ffe8cc" stroke="#f08c00" stroke-width="1.8"/>
  <text x="200" y="296" font-size="14" font-weight="700" text-anchor="middle" fill="#212529">ASSEMBLE CONTEXT</text>
  <text x="200" y="314" font-size="11" text-anchor="middle" fill="#495057">+ skill body (T2) + declared KB (T3)</text>
  <line x1="200" y1="328" x2="200" y2="346" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="70" y="348" width="260" height="42" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="200" y="374" font-size="15" font-weight="700" text-anchor="middle" fill="#212529">LLM</text>
  <line x1="200" y1="390" x2="200" y2="408" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="70" y="410" width="260" height="42" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="200" y="436" font-size="13" font-weight="700" text-anchor="middle" fill="#212529">RESPONSE / TOOL CALLS</text>

  <!-- loop back -->
  <polyline points="330,431 362,431 362,224 332,224" fill="none" stroke="#adb5bd" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text transform="rotate(-90 376 330)" x="376" y="330" font-size="10" text-anchor="middle" fill="#868e96">loops per turn</text>

  <!-- registry -->
  <rect x="70" y="486" width="260" height="66" rx="8" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="200" y="512" font-size="13" font-weight="700" text-anchor="middle" fill="#495057">REGISTRY (cold, on disk)</text>
  <text x="200" y="532" font-size="12" text-anchor="middle" fill="#868e96">40 skills + 12 KB ≈ 24,000 tokens</text>
  <polyline points="70,504 44,504 44,300 68,300" fill="none" stroke="#adb5bd" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text transform="rotate(-90 32 402)" x="32" y="402" font-size="10" text-anchor="middle" fill="#868e96">loaded on demand</text>

  <!-- ===== RIGHT TOP: to scale ===== -->
  <text x="520" y="116" font-size="15" font-weight="700" fill="#212529">2 · Context window — to scale</text>

  <rect x="560" y="170" width="80" height="330" fill="#ffc9c9" stroke="#e03131" stroke-width="1"/>
  <rect x="560" y="328" width="80" height="12" fill="#2f9e44"/>
  <text x="648" y="337" font-size="10" fill="#2b8a3e">← the 1 skill you need</text>
  <text x="600" y="160" font-size="15" font-weight="700" text-anchor="middle" fill="#c92a2a">24,000 tok</text>

  <text x="664" y="222" font-size="12" fill="#495057">All ~40 skill bodies + every</text>
  <text x="664" y="240" font-size="12" fill="#495057">KB doc, loaded every request.</text>
  <text x="664" y="266" font-size="12" font-weight="700" fill="#c92a2a">39 of 40 are irrelevant to</text>
  <text x="664" y="284" font-size="12" font-weight="700" fill="#c92a2a">THIS task → signal buried</text>
  <text x="664" y="302" font-size="11" fill="#868e96">(context rot / lost-in-the-middle)</text>

  <rect x="900" y="484" width="80" height="16" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="940" y="476" font-size="14" font-weight="700" text-anchor="middle" fill="#2b8a3e">1,110 tok</text>
  <text x="994" y="497" font-size="13" font-weight="700" fill="#2f9e44">≈ 1/20 the context</text>

  <line x1="540" y1="500" x2="1180" y2="500" stroke="#ced4da" stroke-width="1.5"/>
  <text x="600" y="518" font-size="11" text-anchor="middle" fill="#868e96">naive (whole catalog)</text>
  <text x="940" y="518" font-size="11" text-anchor="middle" fill="#868e96">orchestrated</text>

  <!-- ===== RIGHT BOTTOM: window composition ===== -->
  <text x="520" y="566" font-size="15" font-weight="700" fill="#212529">3 · Inside the orchestrated window (1,110 tokens)</text>

  <rect x="520.0" y="586" width="71.4"  height="44" fill="#ced4da" stroke="#ffffff" stroke-width="1"/>
  <rect x="591.4" y="586" width="53.5"  height="44" fill="#d0bfff" stroke="#ffffff" stroke-width="1"/>
  <rect x="644.9" y="586" width="154.6" height="44" fill="#a5d8ff" stroke="#ffffff" stroke-width="1"/>
  <rect x="799.5" y="586" width="196.2" height="44" fill="#b2f2bb" stroke="#ffffff" stroke-width="1"/>
  <rect x="995.7" y="586" width="172.4" height="44" fill="#8ce99a" stroke="#ffffff" stroke-width="1"/>
  <rect x="1168.1" y="586" width="11.9" height="44" fill="#ffd8a8" stroke="#ffffff" stroke-width="1"/>
  <text x="618" y="613" font-size="12" text-anchor="middle" fill="#3b2f6b">90</text>
  <text x="722" y="613" font-size="12" text-anchor="middle" fill="#0b3d66">260</text>
  <text x="897" y="613" font-size="12" text-anchor="middle" fill="#1b5e2a">330</text>
  <text x="1082" y="613" font-size="12" text-anchor="middle" fill="#1b5e2a">290</text>

  <!-- legend -->
  <rect x="520" y="654" width="12" height="12" fill="#ced4da"/><text x="537" y="664" font-size="12" fill="#495057">system 120</text>
  <rect x="624" y="654" width="12" height="12" fill="#d0bfff"/><text x="641" y="664" font-size="12" fill="#495057">index · T1 (90)</text>
  <rect x="752" y="654" width="12" height="12" fill="#a5d8ff"/><text x="769" y="664" font-size="12" fill="#495057">skill body · T2 (260)</text>
  <rect x="920" y="654" width="12" height="12" fill="#b2f2bb"/><text x="937" y="664" font-size="12" fill="#495057">KB docs · T3 (330 + 290)</text>
  <rect x="1118" y="654" width="12" height="12" fill="#ffd8a8"/><text x="1135" y="664" font-size="12" fill="#495057">request 20</text>

  <text x="520" y="704" font-size="13" font-weight="700" fill="#212529">Only the index (Tier 1) grows with the catalog.</text>
  <text x="520" y="724" font-size="12" fill="#495057">Add the 40th skill → +1 description line (~5 tokens). Skill body + KB are fixed per request → cost is O(1), not O(n).</text>

  <line x1="60" y1="756" x2="1180" y2="756" stroke="#e9ecef" stroke-width="1"/>
  <text x="60" y="784" font-size="12.5" fill="#868e96">Rule of thumb: route over the index; load skill bodies and KB on demand; never load a body to decide whether to load it.</text>
</svg>
