<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#868e96"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="700" fill="#ffffff"/>

  <!-- title -->
  <text x="60" y="46" font-size="26" font-weight="700" fill="#212529">Progressive disclosure: one router, many skills, one shared KB</text>
  <text x="60" y="74" font-size="15" fill="#868e96">Register the 40th skill — per-request token cost barely moves.</text>

  <!-- user request -->
  <rect x="370" y="100" width="200" height="54" rx="8" fill="#f1f3f5" stroke="#495057" stroke-width="1.5"/>
  <text x="470" y="132" font-size="16" text-anchor="middle" fill="#212529">User request</text>
  <line x1="470" y1="154" x2="470" y2="193" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- orchestrator -->
  <rect x="320" y="198" width="300" height="78" rx="10" fill="#d0bfff" stroke="#7048e8" stroke-width="1.8"/>
  <text x="470" y="232" font-size="19" font-weight="700" text-anchor="middle" fill="#212529">ORCHESTRATOR</text>
  <text x="470" y="256" font-size="12.5" text-anchor="middle" fill="#495057">router · classifies &amp; dispatches</text>
  <text x="900" y="226" font-size="14" font-weight="700" fill="#7048e8">TIER 1 · always loaded</text>
  <text x="900" y="247" font-size="12.5" fill="#868e96">skill names + descriptions (cheap)</text>

  <!-- fan-out arrows orchestrator -> skills -->
  <line x1="470" y1="276" x2="190" y2="377" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="470" y1="276" x2="378" y2="377" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="470" y1="276" x2="562" y2="377" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="470" y1="276" x2="750" y2="377" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- skills -->
  <rect x="98"  y="380" width="168" height="72" rx="9" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.6"/>
  <text x="182" y="421" font-size="15" font-weight="600" text-anchor="middle" fill="#0b3d66">test-cases</text>
  <rect x="290" y="380" width="168" height="72" rx="9" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.6"/>
  <text x="374" y="421" font-size="15" font-weight="600" text-anchor="middle" fill="#0b3d66">bug-report</text>
  <rect x="482" y="380" width="168" height="72" rx="9" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.6"/>
  <text x="566" y="421" font-size="15" font-weight="600" text-anchor="middle" fill="#0b3d66">flaky-triage</text>
  <rect x="674" y="380" width="168" height="72" rx="9" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.6"/>
  <text x="758" y="421" font-size="15" font-weight="600" text-anchor="middle" fill="#0b3d66">release-notes</text>
  <text x="900" y="406" font-size="14" font-weight="700" fill="#1971c2">TIER 2 · on match</text>
  <text x="900" y="427" font-size="12.5" fill="#868e96">the picked skill's full body</text>

  <!-- converge arrows skills -> KB -->
  <line x1="182" y1="452" x2="372" y2="537" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="374" y1="452" x2="440" y2="537" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="566" y1="452" x2="500" y2="537" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="758" y1="452" x2="568" y2="537" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- knowledge base -->
  <rect x="210" y="540" width="520" height="78" rx="10" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.8"/>
  <text x="470" y="574" font-size="16" font-weight="700" text-anchor="middle" fill="#1b5e2a">KNOWLEDGE BASE</text>
  <text x="470" y="597" font-size="12.5" text-anchor="middle" fill="#2b6b3a">conventions · facts · bug-format · release</text>
  <text x="900" y="568" font-size="14" font-weight="700" fill="#2f9e44">TIER 3 · on demand</text>
  <text x="900" y="589" font-size="12.5" fill="#868e96">only the KB docs it references</text>

  <!-- footer caption -->
  <text x="60" y="666" font-size="14" fill="#495057">Same answer, 1 of 4 skills + 2 of 4 KB docs loaded → ~57% fewer tokens (≈95% at 40 skills).</text>
</svg>
